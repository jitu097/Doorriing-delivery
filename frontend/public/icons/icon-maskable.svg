<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Maskable icon: NO rounded corners, full-bleed orange fill.
    Android adaptive icons require the "safe zone" (center 80%) to contain
    all meaningful content. The "D" sits well within that zone here.
  -->
  <rect width="512" height="512" fill="#FF6600"/>
  <text
    x="256"
    y="370"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="320"
    fill="white"
    text-anchor="middle">D</text>
</svg>
